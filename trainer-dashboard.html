<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Mode - Trainer Dashboard</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --border: #475569;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .top-bar {
    background: linear-gradient(135deg, #1e3a5f, #2d1b69);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    border-bottom: 2px solid var(--accent2);
  }
  .top-bar h1 { font-size: 1.6rem; font-weight: 700; }
  .top-bar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-small { padding: 5px 10px; font-size: .78rem; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    border: 1px solid var(--surface2);
  }
  .stat-card .stat-value {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-card .stat-label { font-size: .8rem; color: var(--text2); margin-top: 4px; }

  /* Client grid */
  .client-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .client-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--surface2);
    cursor: pointer;
    transition: all .2s;
  }
  .client-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .client-card.selected { border-color: var(--accent); box-shadow: 0 0 15px #3b82f633; }
  .client-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .client-name { font-size: 1.1rem; font-weight: 700; }
  .client-meta { font-size: .75rem; color: var(--text2); }
  .client-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .client-stat {
    text-align: center;
    padding: 8px;
    background: var(--bg);
    border-radius: 8px;
  }
  .client-stat .val {
    font-size: 1.2rem;
    font-weight: 800;
  }
  .client-stat .lbl { font-size: .68rem; color: var(--text2); }
  .streak-fire { color: var(--orange); }
  .score-green { color: var(--green); }
  .pct-blue { color: var(--accent); }

  /* Progress bars */
  .progress-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .4s ease;
  }
  .cat-progress { margin-bottom: 6px; }
  .cat-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: .75rem;
    color: var(--text2);
  }

  /* Detail panel */
  .detail-panel {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    border: 1px solid var(--surface2);
    display: none;
  }
  .detail-panel.visible { display: block; }
  .detail-panel h2 { margin-bottom: 16px; }
  .detail-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid var(--surface2); }
  .detail-tab {
    padding: 8px 16px;
    background: transparent;
    border: none;
    color: var(--text2);
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .detail-content { display: none; }
  .detail-content.active { display: block; }

  /* Tables */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .82rem;
  }
  .data-table th {
    background: var(--surface2);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .data-table td {
    padding: 6px 10px;
    border: 1px solid var(--surface2);
  }
  .data-table tr:hover td { background: #ffffff08; }
  .done-yes { color: var(--green); font-weight: 600; }
  .done-no { color: var(--red); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000aa;
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 600px;
    width: 90%;
    border: 1px solid var(--accent);
  }
  .modal h3 { margin-bottom: 16px; }
  .modal textarea {
    width: 100%;
    height: 150px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: 8px;
    font-size: .85rem;
    font-family: monospace;
    resize: vertical;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h2 { color: var(--text); margin-bottom: 8px; }

  /* Responsive */
  @media (max-width: 768px) {
    .container { padding: 12px; }
    .top-bar { padding: 14px 16px; }
    .top-bar h1 { font-size: 1.2rem; }
    .client-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .top-bar { flex-direction: column; align-items: flex-start; }
    .top-bar-actions { width: 100%; }
    .top-bar-actions .btn { flex: 1; justify-content: center; font-size: .75rem; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>&#128170; Beast Mode <span style="color:var(--accent2)">Trainer</span></h1>
  <div class="top-bar-actions">
    <button class="btn btn-primary" onclick="openImportModal()">&#128229; Import Client</button>
    <button class="btn btn-secondary" onclick="exportAllCSV()">&#128196; Export CSV</button>
    <button class="btn btn-danger btn-small" onclick="clearAllClients()">Clear All</button>
  </div>
</div>

<div class="container">
  <div class="stats-row" id="trainer-stats"></div>

  <h2 style="margin-bottom:16px;" id="clients-heading">Clients</h2>
  <div class="client-grid" id="client-grid"></div>

  <div class="detail-panel" id="detail-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 id="detail-name">Client Details</h2>
      <button class="btn btn-secondary btn-small" onclick="closeDetail()">&#10005; Close</button>
    </div>
    <div class="detail-tabs" id="detail-tabs"></div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="modal-import">
  <div class="modal">
    <h3>Import Client Data</h3>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:12px;">Paste the sync code your client sent you:</p>
    <textarea id="import-code" placeholder="Paste BM1:... sync code here"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-import')">Cancel</button>
      <button class="btn btn-primary" onclick="importClient()">Import</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
function loadClients() {
  try {
    const raw = localStorage.getItem('beastModeTrainer');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {};
}
function saveClients() {
  localStorage.setItem('beastModeTrainer', JSON.stringify(clients));
}
let clients = loadClients(); // { clientName: { ...syncData, importedAt } }

// ═══════════════════════════════════════════
// IMPORT
// ═══════════════════════════════════════════
function openImportModal() {
  document.getElementById('import-code').value = '';
  document.getElementById('modal-import').classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function importClient() {
  const raw = document.getElementById('import-code').value.trim();
  if (!raw.startsWith('BM1:')) {
    alert('Invalid sync code. It should start with BM1:');
    return;
  }
  try {
    const json = decodeURIComponent(escape(atob(raw.substring(4))));
    const data = JSON.parse(json);
    if (!data.name || !data.categories) {
      alert('Invalid sync data — missing name or categories.');
      return;
    }
    data.importedAt = new Date().toISOString();
    clients[data.name] = data;
    saveClients();
    closeModal('modal-import');
    renderAll();
    alert(`Imported data for ${data.name}!`);
  } catch(e) {
    alert('Failed to decode sync code. Make sure you copied the full code.');
  }
}

// ═══════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════
function calcClientStats(data) {
  let totalSched = 0, totalDone = 0;
  const weekScores = [];

  for (let w = 0; w < 4; w++) {
    let weekBase = 0, weekBonuses = 0;
    let weekSched = 0, weekDone = 0;

    // Per-day perfect day check
    for (let d = 0; d < 7; d++) {
      let daySched = 0, dayDone = 0;
      data.categories.forEach(cat => {
        if (!cat.days.includes(d)) return;
        cat.exercises.forEach(ex => {
          daySched++; totalSched++; weekSched++;
          const key = `${cat.id}|${ex.name}|w${w}d${d}`;
          if (data.log[key]?.done) { dayDone++; totalDone++; weekDone++; weekBase += 10; }
        });
      });
      if (daySched > 0 && dayDone === daySched) weekBonuses += 50;
    }

    // Per-category bonus
    data.categories.forEach(cat => {
      let s = 0, d = 0;
      for (let day = 0; day < 7; day++) {
        if (!cat.days.includes(day)) continue;
        cat.exercises.forEach(ex => { s++; const k = `${cat.id}|${ex.name}|w${w}d${day}`; if (data.log[k]?.done) d++; });
      }
      if (s > 0 && d === s) weekBonuses += 25;
    });

    if (weekSched > 0 && weekDone === weekSched) weekBonuses += 100;
    weekScores.push(weekBase + weekBonuses);
  }

  // Streak
  let streak = 0;
  for (let w = 3; w >= 0; w--) {
    for (let d = 6; d >= 0; d--) {
      let complete = true, hasWork = false;
      data.categories.forEach(cat => {
        if (!cat.days.includes(d)) return;
        cat.exercises.forEach(ex => {
          hasWork = true;
          const key = `${cat.id}|${ex.name}|w${w}d${d}`;
          if (!data.log[key]?.done) complete = false;
        });
      });
      if (!hasWork) continue;
      if (complete) streak++;
      else { w = -1; break; } // break both loops
    }
  }

  const pct = totalSched > 0 ? Math.round(totalDone / totalSched * 100) : 0;
  const currentWeekScore = weekScores[data.currentWeek || 0] || 0;
  const bestWeekScore = Math.max(...weekScores, data.bestWeeklyScore || 0);

  return { totalSched, totalDone, pct, streak, bestStreak: data.bestStreak || 0, currentWeekScore, bestWeekScore, weekScores };
}

function calcCategoryProgress(data, weekIdx) {
  return data.categories.map(cat => {
    let sched = 0, done = 0;
    for (let d = 0; d < 7; d++) {
      if (!cat.days.includes(d)) continue;
      cat.exercises.forEach(ex => {
        sched++;
        const key = `${cat.id}|${ex.name}|w${weekIdx}d${d}`;
        if (data.log[key]?.done) done++;
      });
    }
    return { name: cat.name, sched, done, pct: sched > 0 ? Math.round(done / sched * 100) : 0 };
  });
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderAll() {
  renderTrainerStats();
  renderClientGrid();
}

function renderTrainerStats() {
  const names = Object.keys(clients);
  const count = names.length;
  let totalCompletion = 0;
  let avgStreak = 0;
  names.forEach(n => {
    const stats = calcClientStats(clients[n]);
    totalCompletion += stats.pct;
    avgStreak += stats.streak;
  });
  const avgPct = count > 0 ? Math.round(totalCompletion / count) : 0;
  const avgStr = count > 0 ? Math.round(avgStreak / count * 10) / 10 : 0;

  document.getElementById('trainer-stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${count}</div><div class="stat-label">Active Clients</div></div>
    <div class="stat-card"><div class="stat-value">${avgPct}%</div><div class="stat-label">Avg Completion</div></div>
    <div class="stat-card"><div class="stat-value">${avgStr}</div><div class="stat-label">Avg Streak</div></div>
  `;
}

function renderClientGrid() {
  const grid = document.getElementById('client-grid');
  const names = Object.keys(clients).sort();

  if (names.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="icon">&#128170;</div>
      <h2>No clients yet</h2>
      <p>Click "Import Client" and paste a sync code from a Beast Mode user.</p>
    </div>`;
    return;
  }

  grid.innerHTML = names.map(name => {
    const data = clients[name];
    const stats = calcClientStats(data);
    const weekIdx = data.currentWeek || 0;
    const catProgress = calcCategoryProgress(data, weekIdx);
    const syncDate = new Date(data.ts || data.importedAt);
    const timeAgo = getTimeAgo(syncDate);

    const progressBars = catProgress.map(cp => {
      const color = cp.pct >= 80 ? 'var(--green)' : cp.pct >= 50 ? 'var(--orange)' : 'var(--accent)';
      return `<div class="cat-progress">
        <div class="cat-progress-label"><span>${cp.name}</span><span>${cp.pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${cp.pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');

    return `<div class="client-card" onclick="showDetail('${name.replace(/'/g, "\\'")}')">
      <div class="client-header">
        <div class="client-name">${name}</div>
        <div class="client-meta">Synced ${timeAgo}</div>
      </div>
      <div class="client-stats">
        <div class="client-stat"><div class="val streak-fire">${stats.streak} &#128293;</div><div class="lbl">Streak</div></div>
        <div class="client-stat"><div class="val score-green">${stats.currentWeekScore}</div><div class="lbl">Week Score</div></div>
        <div class="client-stat"><div class="val pct-blue">${stats.pct}%</div><div class="lbl">Overall</div></div>
      </div>
      ${progressBars}
    </div>`;
  }).join('');
}

function getTimeAgo(date) {
  const mins = Math.floor((Date.now() - date.getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

// ═══════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════
let selectedClient = null;

function showDetail(name) {
  selectedClient = name;
  const data = clients[name];
  const stats = calcClientStats(data);
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');

  document.getElementById('detail-name').textContent = `${name}'s Details`;

  // Tabs for each week
  document.getElementById('detail-tabs').innerHTML = [0,1,2,3].map(w =>
    `<button class="detail-tab ${w === (data.currentWeek||0) ? 'active' : ''}" onclick="showWeekDetail('${name.replace(/'/g, "\\'")}', ${w})"">Week ${w+1}</button>`
  ).join('') + `<button class="detail-tab" onclick="showSummaryDetail('${name.replace(/'/g, "\\'")}')">Summary</button>`
    + `<button class="btn btn-danger btn-small" style="margin-left:auto;" onclick="removeClient('${name.replace(/'/g, "\\'")}')">Remove Client</button>`;

  showWeekDetail(name, data.currentWeek || 0);
  panel.scrollIntoView({ behavior: 'smooth' });
}

function showWeekDetail(name, weekIdx) {
  const data = clients[name];
  // Update active tab
  document.querySelectorAll('.detail-tab').forEach((t, i) => {
    t.classList.toggle('active', i === weekIdx);
  });

  const START_DATE = new Date('2026-03-16');
  const dates = [];
  for (let d = 0; d < 7; d++) {
    const date = new Date(START_DATE);
    date.setDate(date.getDate() + weekIdx * 7 + d);
    dates.push(date);
  }

  let html = '';
  data.categories.forEach(cat => {
    if (cat.exercises.length === 0) return;
    html += `<h3 style="margin:16px 0 8px;font-size:.95rem;">${cat.name}</h3>`;
    html += '<div style="overflow-x:auto;"><table class="data-table"><tr><th>Exercise</th>';
    dates.forEach((d, di) => {
      const isScheduled = cat.days.includes(di);
      html += `<th style="${isScheduled ? '' : 'opacity:.3'}">${DAYS[di]} ${d.getMonth()+1}/${d.getDate()}</th>`;
    });
    html += '</tr>';

    cat.exercises.forEach(ex => {
      html += `<tr><td>${ex.name}</td>`;
      dates.forEach((d, di) => {
        if (!cat.days.includes(di)) { html += '<td style="opacity:.3;text-align:center;">—</td>'; return; }
        const key = `${cat.id}|${ex.name}|w${weekIdx}d${di}`;
        const val = data.log[key] || {};
        if (!val.done) { html += '<td class="done-no" style="text-align:center;">✗</td>'; return; }

        let detail = '✓';
        switch(ex.metric) {
          case 'sets_reps': detail = (val.sets||val.reps) ? `${val.sets||'?'}x${val.reps||'?'}` : '✓'; break;
          case 'sets_reps_weight': detail = (val.sets||val.reps) ? `${val.sets||'?'}x${val.reps||'?'} @${val.weight||'?'}` : '✓'; break;
          case 'duration': detail = `${val.duration||0}m${val.seconds ? val.seconds+'s' : ''}`; break;
          case 'distance_time': detail = `${val.distance||'?'} / ${val.time||'?'}m`; break;
          case 'makes_attempts': detail = (val.makes||val.attempts) ? `${val.makes||0}/${val.attempts||0}` : '✓'; break;
          case 'reps': detail = val.reps ? `${val.reps}` : '✓'; break;
          case 'notes': detail = val.notes || '✓'; break;
        }
        html += `<td class="done-yes" style="text-align:center;">${detail}</td>`;
      });
      html += '</tr>';
    });
    html += '</table></div>';
  });

  document.getElementById('detail-body').innerHTML = html || '<p style="color:var(--text2)">No exercise data for this week.</p>';
}

function showSummaryDetail(name) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.detail-tab').forEach(t => { if (t.textContent === 'Summary') t.classList.add('active'); });

  const data = clients[name];
  const stats = calcClientStats(data);

  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px;">
    <div class="client-stat" style="padding:12px;background:var(--surface2);border-radius:8px;">
      <div class="val streak-fire" style="font-size:1.5rem;">${stats.streak} 🔥</div><div class="lbl">Current Streak</div></div>
    <div class="client-stat" style="padding:12px;background:var(--surface2);border-radius:8px;">
      <div class="val" style="font-size:1.5rem;">${stats.bestStreak}</div><div class="lbl">Best Streak</div></div>
    <div class="client-stat" style="padding:12px;background:var(--surface2);border-radius:8px;">
      <div class="val score-green" style="font-size:1.5rem;">${stats.currentWeekScore}</div><div class="lbl">Current Week Score</div></div>
    <div class="client-stat" style="padding:12px;background:var(--surface2);border-radius:8px;">
      <div class="val" style="font-size:1.5rem;">${stats.bestWeekScore}</div><div class="lbl">Best Week Score</div></div>
    <div class="client-stat" style="padding:12px;background:var(--surface2);border-radius:8px;">
      <div class="val pct-blue" style="font-size:1.5rem;">${stats.pct}%</div><div class="lbl">Overall Completion</div></div>
    <div class="client-stat" style="padding:12px;background:var(--surface2);border-radius:8px;">
      <div class="val" style="font-size:1.5rem;">${stats.totalDone}/${stats.totalSched}</div><div class="lbl">Exercises Done</div></div>
  </div>`;

  html += '<h3 style="margin-bottom:10px;">Weekly Scores</h3>';
  html += '<div style="display:flex;gap:12px;margin-bottom:20px;">';
  stats.weekScores.forEach((score, i) => {
    const isBest = score === stats.bestWeekScore && score > 0;
    html += `<div style="flex:1;text-align:center;padding:12px;background:var(--surface2);border-radius:8px;${isBest ? 'border:2px solid var(--orange);' : ''}">
      <div style="font-size:.75rem;color:var(--text2);">Week ${i+1}</div>
      <div style="font-size:1.3rem;font-weight:700;${isBest ? 'color:var(--orange)' : ''}">${score}</div>
      ${isBest ? '<div style="font-size:.65rem;color:var(--orange);">BEST</div>' : ''}
    </div>`;
  });
  html += '</div>';

  // Category breakdown
  html += '<h3 style="margin-bottom:10px;">Category Completion (All Weeks)</h3>';
  data.categories.forEach(cat => {
    let s = 0, d = 0;
    for (let w = 0; w < 4; w++) {
      for (let day = 0; day < 7; day++) {
        if (!cat.days.includes(day)) continue;
        cat.exercises.forEach(ex => { s++; const k = `${cat.id}|${ex.name}|w${w}d${day}`; if (data.log[k]?.done) d++; });
      }
    }
    const p = s > 0 ? Math.round(d / s * 100) : 0;
    const color = p >= 80 ? 'var(--green)' : p >= 50 ? 'var(--orange)' : 'var(--accent)';
    html += `<div class="cat-progress" style="margin-bottom:8px;">
      <div class="cat-progress-label"><span>${cat.name}</span><span>${d}/${s} (${p}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${color}"></div></div>
    </div>`;
  });

  document.getElementById('detail-body').innerHTML = html;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  selectedClient = null;
}

function removeClient(name) {
  if (!confirm(`Remove ${name} from the dashboard? Their data in Beast Mode won't be affected.`)) return;
  delete clients[name];
  saveClients();
  closeDetail();
  renderAll();
}

// ═══════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════
function exportAllCSV() {
  const names = Object.keys(clients).sort();
  if (names.length === 0) { alert('No clients to export.'); return; }

  let csv = 'Client,Week,Day,Category,Exercise,Completed,Details\n';
  names.forEach(name => {
    const data = clients[name];
    for (let w = 0; w < 4; w++) {
      for (let d = 0; d < 7; d++) {
        data.categories.forEach(cat => {
          if (!cat.days.includes(d)) return;
          cat.exercises.forEach(ex => {
            const key = `${cat.id}|${ex.name}|w${w}d${d}`;
            const val = data.log[key] || {};
            const done = val.done ? 'Yes' : 'No';
            let details = '';
            if (val.done) {
              switch(ex.metric) {
                case 'sets_reps': details = `${val.sets||''}x${val.reps||''}`; break;
                case 'sets_reps_weight': details = `${val.sets||''}x${val.reps||''} @${val.weight||''}lbs`; break;
                case 'duration': details = `${val.duration||0}m ${val.seconds||0}s`; break;
                case 'distance_time': details = `${val.distance||''} in ${val.time||''}min`; break;
                case 'makes_attempts': details = `${val.makes||0}/${val.attempts||0}`; break;
                case 'reps': details = `${val.reps||''} reps`; break;
                case 'notes': details = val.notes || ''; break;
              }
            }
            csv += `"${name}",Week ${w+1},${DAYS[d]},"${cat.name}","${ex.name}",${done},"${details}"\n`;
          });
        });
      }
    }
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `beast-mode-trainer-export-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

function clearAllClients() {
  if (!confirm('Remove ALL client data from the dashboard?')) return;
  if (!confirm('Are you sure? This cannot be undone.')) return;
  clients = {};
  saveClients();
  closeDetail();
  renderAll();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderAll();
</script>
