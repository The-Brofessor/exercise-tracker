<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily / Weekly Exercise Tracker</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --border: #475569;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  /* ── Top bar ── */
  .top-bar {
    background: linear-gradient(135deg, #1e3a5f, #2d1b69);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    border-bottom: 2px solid var(--accent);
  }
  .top-bar h1 { font-size: 1.6rem; font-weight: 700; }
  .top-bar h1 span { color: var(--accent); }
  .top-bar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  /* ── Buttons ── */
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-small { padding: 5px 10px; font-size: .78rem; }
  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--surface2);
    padding-bottom: 0;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 20px;
    background: transparent;
    border: none;
    color: var(--text2);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid var(--surface2);
  }
  .card h3 {
    font-size: 1.05rem;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    font-size: .7rem;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-daily { background: #22c55e33; color: var(--green); }
  .badge-weekly { background: #3b82f633; color: var(--accent); }
  /* ── Category config ── */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
    gap: 16px;
  }
  .cat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--surface2);
    transition: border-color .2s;
    overflow: hidden;
  }
  .cat-card:hover { border-color: var(--accent); }
  .cat-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .cat-title { font-size: 1rem; font-weight: 700; }
  .cat-freq {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 12px;
  }
  .cat-freq label { font-size: .82rem; color: var(--text2); }
  .cat-freq select, .cat-freq input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: .82rem;
  }
  .exercise-list { list-style: none; }
  .exercise-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--surface2);
    font-size: .88rem;
  }
  .exercise-item:last-child { border-bottom: none; }
  .exercise-item .name { flex: 1; }
  .exercise-item .metric-type { color: var(--text2); font-size: .78rem; margin-right: 8px; }
  .add-exercise-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .add-exercise-row input, .add-exercise-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: .82rem;
    min-width: 0;
  }
  .add-exercise-row input { flex: 1; min-width: 100px; }
  .add-exercise-row select { flex: 1; min-width: 120px; }
  .add-exercise-row .btn { flex-shrink: 0; white-space: nowrap; }
  /* ── Tracker table ── */
  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .week-nav h2 { font-size: 1.2rem; }
  .tracker-section { margin-bottom: 28px; }
  .tracker-section h3 {
    font-size: 1rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tracker-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .82rem;
  }
  .tracker-table th {
    background: var(--surface2);
    padding: 8px 10px;
    text-align: center;
    font-weight: 600;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .tracker-table th:first-child { text-align: left; min-width: 140px; }
  .tracker-table td {
    padding: 6px 8px;
    border: 1px solid var(--surface2);
    text-align: center;
    vertical-align: middle;
  }
  .tracker-table td:first-child { text-align: left; font-weight: 500; }
  .tracker-table tr:hover td { background: #ffffff08; }
  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .day-cell input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--green);
    cursor: pointer;
  }
  .day-cell input[type="number"], .day-cell input[type="text"] {
    width: 58px;
    background: var(--bg);
    border: 1px solid var(--surface2);
    color: var(--text);
    padding: 3px 5px;
    border-radius: 4px;
    font-size: .78rem;
    text-align: center;
  }
  .day-cell input[type="number"]:focus, .day-cell input[type="text"]:focus {
    border-color: var(--accent);
    outline: none;
  }
  .scheduled-day { background: var(--surface); }
  .rest-day { background: var(--bg); opacity: .4; }
  /* ── Progress bars ── */
  .progress-container { margin-bottom: 20px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: .85rem;
    margin-bottom: 4px;
  }
  .progress-bar {
    height: 10px;
    background: var(--surface2);
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    transition: width .4s ease;
  }
  /* ── Motivation ── */
  .quote-card {
    background: linear-gradient(135deg, #1e3a5f, #2d1b69);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    text-align: center;
    border: 1px solid var(--accent);
    position: relative;
  }
  .quote-card .quote-icon {
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .quote-card blockquote {
    font-size: 1.15rem;
    font-style: italic;
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .quote-card .author { color: var(--text2); font-size: .9rem; }
  .quote-card .refresh-quote {
    position: absolute;
    top: 12px;
    right: 12px;
    background: #ffffff15;
    border: none;
    color: var(--text2);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .quote-card .refresh-quote:hover { background: #ffffff30; color: var(--text); }
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .video-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--surface2);
  }
  .video-card iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
  }
  .video-card .video-info { padding: 12px; }
  .video-card .video-info h4 { font-size: .9rem; margin-bottom: 4px; }
  .video-card .video-info p { font-size: .78rem; color: var(--text2); }
  /* ── Stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    border: 1px solid var(--surface2);
  }
  .stat-card .stat-value {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-card .stat-label { font-size: .8rem; color: var(--text2); margin-top: 4px; }
  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000aa;
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 500px;
    width: 90%;
    border: 1px solid var(--accent);
  }
  .modal h3 { margin-bottom: 16px; }
  .modal label { display: block; font-size: .85rem; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: .9rem;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  /* ── Responsive: Tablet ── */
  @media (max-width: 768px) {
    .container { padding: 12px; }
    .top-bar { padding: 14px 16px; }
    .top-bar h1 { font-size: 1.2rem; }
    .top-bar-actions { width: 100%; justify-content: flex-end; }
    .category-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .video-grid { grid-template-columns: 1fr; }
    .tracker-table { font-size: .75rem; }
    .day-cell input[type="number"], .day-cell input[type="text"] { width: 46px; }
  }
  /* ── Responsive: Mobile ── */
  @media (max-width: 480px) {
    .container { padding: 8px; }
    .top-bar { padding: 12px; flex-direction: column; align-items: flex-start; }
    .top-bar h1 { font-size: 1.1rem; }
    .top-bar-actions { width: 100%; }
    .top-bar-actions .btn { flex: 1; justify-content: center; font-size: .75rem; padding: 6px 8px; }
    .tabs { gap: 0; }
    .tab { padding: 10px 12px; font-size: .8rem; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-card .stat-value { font-size: 1.5rem; }
    .stat-card .stat-label { font-size: .7rem; }
    .quote-card { padding: 18px 14px; }
    .quote-card blockquote { font-size: 1rem; }
    .category-grid { grid-template-columns: 1fr; }
    .cat-header { flex-direction: column; gap: 8px; }
    .add-exercise-row { flex-direction: column; }
    .add-exercise-row input, .add-exercise-row select { width: 100%; min-width: unset; }
    .add-exercise-row .btn { width: 100%; justify-content: center; }
    .video-grid { grid-template-columns: 1fr; }
    .week-nav h2 { font-size: 1rem; }
    .modal { padding: 20px 16px; width: 95%; }
    /* Mobile tracker: horizontal scroll */
    .tracker-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -8px; padding: 0 8px; }
    .tracker-table { font-size: .7rem; min-width: 500px; }
    .tracker-table th { padding: 6px 6px; font-size: .68rem; }
    .tracker-table th:first-child { min-width: 90px; }
    .tracker-table td { padding: 4px 4px; }
    .day-cell input[type="number"], .day-cell input[type="text"] { width: 38px; font-size: .7rem; padding: 2px 3px; }
    .day-cell input[type="checkbox"] { width: 16px; height: 16px; }
    .progress-label { font-size: .78rem; }
    h2 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1><span>&#9889;</span> Exercise Tracker</h1>
  <div class="top-bar-actions">
    <button class="btn btn-secondary" onclick="exportData()">&#128190; Export Data</button>
    <button class="btn btn-secondary" onclick="importData()">&#128194; Import Data</button>
    <button class="btn btn-danger btn-small" onclick="resetAllData()">Reset All</button>
  </div>
</div>

<div class="container">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="tracker">Weekly Tracker</button>
    <button class="tab" data-tab="categories">Categories &amp; Exercises</button>
    <button class="tab" data-tab="motivation">Motivation</button>
  </div>

  <!-- ═══════ DASHBOARD ═══════ -->
  <div class="tab-content active" id="tab-dashboard">
    <div id="quote-area"></div>
    <div class="stats-row" id="stats-row"></div>
    <h2 style="margin-bottom:16px;">Weekly Completion</h2>
    <div id="dashboard-progress"></div>
  </div>

  <!-- ═══════ WEEKLY TRACKER ═══════ -->
  <div class="tab-content" id="tab-tracker">
    <div class="week-nav">
      <button class="btn btn-secondary btn-small" onclick="changeWeek(-1)">&#9664; Prev</button>
      <h2 id="week-label">Week 1</h2>
      <button class="btn btn-secondary btn-small" onclick="changeWeek(1)">Next &#9654;</button>
    </div>
    <div id="tracker-body"></div>
  </div>

  <!-- ═══════ CATEGORIES ═══════ -->
  <div class="tab-content" id="tab-categories">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>Categories &amp; Exercises</h2>
      <button class="btn btn-primary" onclick="openAddCategoryModal()">+ Add Category</button>
    </div>
    <div class="category-grid" id="category-grid"></div>
  </div>

  <!-- ═══════ MOTIVATION ═══════ -->
  <div class="tab-content" id="tab-motivation">
    <div id="motivation-quote-area"></div>
    <h2 style="margin-bottom:16px;">Workout Videos</h2>
    <div class="video-grid" id="video-grid"></div>
    <div style="margin-top:20px;text-align:center;">
      <button class="btn btn-primary" onclick="openAddVideoModal()">+ Add Video</button>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="modal-add-category">
  <div class="modal">
    <h3>Add New Category</h3>
    <label>Category Name</label>
    <input type="text" id="new-cat-name" placeholder="e.g. Yoga / Stretching">
    <label>Frequency</label>
    <select id="new-cat-freq-type">
      <option value="daily">Daily (7x/week)</option>
      <option value="custom">Custom (x times/week)</option>
    </select>
    <div id="custom-freq-row" style="display:none;margin-top:8px;">
      <label>Times per week</label>
      <input type="number" id="new-cat-freq-num" min="1" max="7" value="3">
    </div>
    <label>Scheduled Days (for non-daily)</label>
    <div id="day-checkboxes" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-category')">Cancel</button>
      <button class="btn btn-primary" onclick="addCategory()">Add Category</button>
    </div>
  </div>
</div>

<!-- Add Video Modal -->
<div class="modal-overlay" id="modal-add-video">
  <div class="modal">
    <h3>Add Motivational Video</h3>
    <label>YouTube URL or Video ID</label>
    <input type="text" id="new-video-url" placeholder="https://youtube.com/watch?v=...">
    <label>Title</label>
    <input type="text" id="new-video-title" placeholder="Video title">
    <label>Description (optional)</label>
    <input type="text" id="new-video-desc" placeholder="Short description">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-video')">Cancel</button>
      <button class="btn btn-primary" onclick="addVideo()">Add Video</button>
    </div>
  </div>
</div>

<!-- Edit Category Modal -->
<div class="modal-overlay" id="modal-edit-category">
  <div class="modal">
    <h3>Edit Category</h3>
    <input type="hidden" id="edit-cat-id">
    <label>Category Name</label>
    <input type="text" id="edit-cat-name">
    <label>Frequency</label>
    <select id="edit-cat-freq-type">
      <option value="daily">Daily (7x/week)</option>
      <option value="custom">Custom (x times/week)</option>
    </select>
    <div id="edit-custom-freq-row" style="display:none;margin-top:8px;">
      <label>Times per week</label>
      <input type="number" id="edit-cat-freq-num" min="1" max="7" value="3">
    </div>
    <label>Scheduled Days</label>
    <div id="edit-day-checkboxes" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteCategory()" style="margin-right:auto;">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-category')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()">Save</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const METRIC_TYPES = {
  'checkbox': 'Completion Only',
  'reps': 'Reps',
  'sets_reps': 'Sets x Reps',
  'sets_reps_weight': 'Sets x Reps x Weight',
  'duration': 'Duration (min:sec)',
  'distance_time': 'Distance & Time',
  'makes_attempts': 'Makes / Attempts',
  'notes': 'Free Text Notes'
};

const START_DATE = new Date('2026-03-16');

function defaultCategories() {
  return [
    { id: 'daily-core', name: 'Daily Core Exercises', freqType: 'daily', freqNum: 7, days: [0,1,2,3,4,5,6], exercises: [
      { name: 'Hip Activator (w/ band)', metric: 'sets_reps' },
      { name: 'Bridges (w/ ball over head)', metric: 'sets_reps' },
      { name: 'Front Planks', metric: 'duration' },
      { name: 'Side Planks', metric: 'duration' },
      { name: 'Back Planks', metric: 'duration' },
      { name: 'Dead Bugs (w/ ball)', metric: 'sets_reps' },
    ]},
    { id: 'core-3x', name: 'Core Stretch (3x/week)', freqType: 'custom', freqNum: 3, days: [0,2,4], exercises: [
      { name: 'Squats (narrow) — 2x12', metric: 'sets_reps' },
      { name: 'Squats (wide) — 2x12', metric: 'sets_reps' },
      { name: 'Side Lunges (assisted w/ box) — 2x8', metric: 'sets_reps' },
      { name: 'Hip Flexor Lunge (w/ box) — 2x8', metric: 'sets_reps' },
      { name: 'Curtsy Lunge — 2x8', metric: 'sets_reps' },
      { name: 'Figure 4 Standing Hip Stretch', metric: 'duration' },
      { name: 'On Back Leg Up (Hamstring Stretch)', metric: 'duration' },
    ]},
    { id: 'arm-care', name: 'Throwing Arm Care', freqType: 'custom', freqNum: 2, days: [1,4], exercises: [] },
    { id: 'strength', name: 'Strength Training', freqType: 'custom', freqNum: 4, days: [0,1,3,4], exercises: [] },
    { id: 'treadmill', name: 'Treadmill Walking', freqType: 'daily', freqNum: 7, days: [0,1,2,3,4,5,6], exercises: [
      { name: '15 Min Walk', metric: 'duration' },
    ]},
    { id: 'basketball', name: 'Basketball Shooting', freqType: 'custom', freqNum: 2, days: [2,5], exercises: [
      { name: '50 Shot Shooting Cycle — 3 sets', metric: 'makes_attempts' },
    ]},
  ];
}

function loadState() {
  try {
    const raw = localStorage.getItem('exerciseTracker');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { categories: defaultCategories(), log: {}, videos: defaultVideos(), currentWeek: 0 };
}

function migrateState(state) {
  // Migrate: update categories with new defaults if exercises are empty and names changed
  const defaults = defaultCategories();
  defaults.forEach(def => {
    const existing = state.categories.find(c => c.id === def.id);
    if (existing) {
      // Update name if it changed
      existing.name = def.name;
      // If no exercises have been added yet, use the new defaults
      if (existing.exercises.length === 0 && def.exercises.length > 0) {
        existing.exercises = def.exercises;
      }
    }
  });
  return state;
}

function saveState() {
  localStorage.setItem('exerciseTracker', JSON.stringify(state));
}

let state = loadState();
state = migrateState(state);
if (!state.videos) { state.videos = defaultVideos(); }

function randomQuote() {
  return QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

function renderQuote(containerId) {
  const q = randomQuote();
  document.getElementById(containerId).innerHTML = `
    <div class="quote-card">
      <button class="refresh-quote" onclick="renderQuote('${containerId}')" title="New quote">&#8635;</button>
      <div class="quote-icon">&#10077;</div>
      <blockquote>"${q.text}"</blockquote>
      <div class="author">— ${q.author}</div>
    </div>`;
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    renderAll();
  });
});

// ═══════════════════════════════════════════
// WEEK NAVIGATION
// ═══════════════════════════════════════════
function changeWeek(dir) {
  state.currentWeek = Math.max(0, Math.min(3, state.currentWeek + dir));
  saveState();
  renderTracker();
}

function getWeekDates(weekIdx) {
  const dates = [];
  for (let d = 0; d < 7; d++) {
    const date = new Date(START_DATE);
    date.setDate(date.getDate() + weekIdx * 7 + d);
    dates.push(date);
  }
  return dates;
}

function fmtDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ═══════════════════════════════════════════
// RENDER: CATEGORY MANAGEMENT
// ═══════════════════════════════════════════
function renderCategories() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = state.categories.map(cat => {
    const freqLabel = cat.freqType === 'daily' ? 'Daily (7x/week)' : `${cat.freqNum}x/week`;
    const dayLabels = cat.days.map(d => DAYS[d]).join(', ');
    const exerciseHtml = cat.exercises.length === 0
      ? '<p style="color:var(--text2);font-size:.82rem;font-style:italic;">No exercises added yet</p>'
      : `<ul class="exercise-list">${cat.exercises.map((ex, ei) => `
          <li class="exercise-item">
            <span class="name">${ex.name}</span>
            <span class="metric-type">${METRIC_TYPES[ex.metric]}</span>
            <button class="btn btn-danger btn-small" onclick="removeExercise('${cat.id}',${ei})">&#10005;</button>
          </li>`).join('')}</ul>`;
    return `
      <div class="cat-card">
        <div class="cat-header">
          <div>
            <div class="cat-title">${cat.name}</div>
            <div style="font-size:.8rem;color:var(--text2);margin-top:2px;">${freqLabel} &mdash; ${dayLabels}</div>
          </div>
          <button class="btn btn-secondary btn-small" onclick="openEditCategoryModal('${cat.id}')">&#9998; Edit</button>
        </div>
        ${exerciseHtml}
        <div class="add-exercise-row">
          <input type="text" id="ex-name-${cat.id}" placeholder="Exercise name">
          <select id="ex-metric-${cat.id}">
            ${Object.entries(METRIC_TYPES).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}
          </select>
          <button class="btn btn-success btn-small" onclick="addExercise('${cat.id}')">+ Add</button>
        </div>
      </div>`;
  }).join('');
}

function addExercise(catId) {
  const nameInput = document.getElementById('ex-name-' + catId);
  const metricSelect = document.getElementById('ex-metric-' + catId);
  const name = nameInput.value.trim();
  if (!name) return;
  const cat = state.categories.find(c => c.id === catId);
  cat.exercises.push({ name, metric: metricSelect.value });
  nameInput.value = '';
  saveState();
  renderAll();
}

function removeExercise(catId, idx) {
  const cat = state.categories.find(c => c.id === catId);
  cat.exercises.splice(idx, 1);
  saveState();
  renderAll();
}

// ═══════════════════════════════════════════
// RENDER: TRACKER
// ═══════════════════════════════════════════
function renderTracker() {
  const weekIdx = state.currentWeek;
  document.getElementById('week-label').textContent = `Week ${weekIdx + 1} of 4`;
  const dates = getWeekDates(weekIdx);
  const body = document.getElementById('tracker-body');

  body.innerHTML = state.categories.map(cat => {
    if (cat.exercises.length === 0) {
      return `<div class="tracker-section"><div class="card">
        <h3>${cat.name} <span class="badge ${cat.freqType === 'daily' ? 'badge-daily' : 'badge-weekly'}">${cat.freqType === 'daily' ? 'Daily' : cat.freqNum + 'x/wk'}</span></h3>
        <p style="color:var(--text2);font-size:.85rem;">No exercises added yet. Go to Categories tab to add exercises.</p>
      </div></div>`;
    }
    const headerRow = `<tr><th>Exercise</th>${dates.map((d, di) => {
      const isScheduled = cat.days.includes(di);
      return `<th class="${isScheduled ? 'scheduled-day' : 'rest-day'}">${DAYS[di]}<br>${fmtDate(d)}</th>`;
    }).join('')}</tr>`;

    const rows = cat.exercises.map(ex => {
      const cells = dates.map((d, di) => {
        const isScheduled = cat.days.includes(di);
        const key = `${cat.id}|${ex.name}|w${weekIdx}d${di}`;
        const val = state.log[key] || {};
        if (!isScheduled) return `<td class="rest-day">&mdash;</td>`;
        return `<td class="scheduled-day"><div class="day-cell">${renderMetricInputs(ex.metric, key, val)}</div></td>`;
      }).join('');
      return `<tr><td>${ex.name}</td>${cells}</tr>`;
    }).join('');

    return `<div class="tracker-section"><div class="card">
      <h3>${cat.name} <span class="badge ${cat.freqType === 'daily' ? 'badge-daily' : 'badge-weekly'}">${cat.freqType === 'daily' ? 'Daily' : cat.freqNum + 'x/wk'}</span></h3>
      <div class="tracker-table-wrap"><table class="tracker-table">${headerRow}${rows}</table></div>
    </div></div>`;
  }).join('');
}

function renderMetricInputs(metric, key, val) {
  const chk = val.done ? 'checked' : '';
  switch(metric) {
    case 'checkbox':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">`;
    case 'reps':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">
              <input type="number" placeholder="reps" value="${val.reps||''}" onchange="logField('${key}','reps',this.value)">`;
    case 'sets_reps':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">
              <input type="number" placeholder="sets" value="${val.sets||''}" onchange="logField('${key}','sets',this.value)" style="width:40px">
              <span style="color:var(--text2);font-size:.7rem;">x</span>
              <input type="number" placeholder="reps" value="${val.reps||''}" onchange="logField('${key}','reps',this.value)" style="width:40px">`;
    case 'sets_reps_weight':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">
              <input type="number" placeholder="sets" value="${val.sets||''}" onchange="logField('${key}','sets',this.value)" style="width:38px">
              <span style="color:var(--text2);font-size:.7rem;">x</span>
              <input type="number" placeholder="reps" value="${val.reps||''}" onchange="logField('${key}','reps',this.value)" style="width:38px">
              <input type="number" placeholder="lbs" value="${val.weight||''}" onchange="logField('${key}','weight',this.value)" style="width:45px">`;
    case 'duration':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">
              <input type="number" placeholder="min" value="${val.duration||''}" onchange="logField('${key}','duration',this.value)" style="width:40px" min="0">
              <span style="color:var(--text2);font-size:.7rem;">m</span>
              <input type="number" placeholder="sec" value="${val.seconds||''}" onchange="logField('${key}','seconds',this.value)" style="width:40px" min="0" max="59">
              <span style="color:var(--text2);font-size:.7rem;">s</span>`;
    case 'distance_time':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">
              <input type="text" placeholder="dist" value="${val.distance||''}" onchange="logField('${key}','distance',this.value)" style="width:48px">
              <input type="number" placeholder="min" value="${val.time||''}" onchange="logField('${key}','time',this.value)" style="width:48px">`;
    case 'makes_attempts':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">
              <input type="number" placeholder="makes" value="${val.makes||''}" onchange="logField('${key}','makes',this.value)" style="width:45px">
              <span style="color:var(--text2);font-size:.7rem;">/</span>
              <input type="number" placeholder="att" value="${val.attempts||''}" onchange="logField('${key}','attempts',this.value)" style="width:45px">`;
    case 'notes':
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">
              <input type="text" placeholder="notes" value="${val.notes||''}" onchange="logField('${key}','notes',this.value)">`;
    default:
      return `<input type="checkbox" ${chk} onchange="logField('${key}','done',this.checked)">`;
  }
}

function logField(key, field, value) {
  if (!state.log[key]) state.log[key] = {};
  state.log[key][field] = value;
  saveState();
  // Update dashboard if visible
  if (document.getElementById('tab-dashboard').classList.contains('active')) {
    renderDashboard();
  }
}

// ═══════════════════════════════════════════
// RENDER: DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard() {
  renderQuote('quote-area');

  // Stats
  let totalScheduled = 0, totalDone = 0, streakDays = 0;
  for (let w = 0; w < 4; w++) {
    for (let d = 0; d < 7; d++) {
      let dayComplete = true, dayHasWork = false;
      state.categories.forEach(cat => {
        if (!cat.days.includes(d)) return;
        cat.exercises.forEach(ex => {
          dayHasWork = true;
          totalScheduled++;
          const key = `${cat.id}|${ex.name}|w${w}d${d}`;
          if (state.log[key]?.done) totalDone++;
          else dayComplete = false;
        });
      });
    }
  }

  const pct = totalScheduled > 0 ? Math.round(totalDone / totalScheduled * 100) : 0;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-value">${pct}%</div><div class="stat-label">Overall Completion</div></div>
    <div class="stat-card"><div class="stat-value">${totalDone}</div><div class="stat-label">Exercises Completed</div></div>
    <div class="stat-card"><div class="stat-value">${totalScheduled}</div><div class="stat-label">Total Scheduled</div></div>
    <div class="stat-card"><div class="stat-value">${state.categories.length}</div><div class="stat-label">Active Categories</div></div>
    <div class="stat-card"><div class="stat-value">${state.categories.reduce((s,c)=>s+c.exercises.length,0)}</div><div class="stat-label">Total Exercises</div></div>
  `;

  // Per-category progress for current week
  const weekIdx = state.currentWeek;
  const progressHtml = state.categories.map(cat => {
    let sched = 0, done = 0;
    for (let d = 0; d < 7; d++) {
      if (!cat.days.includes(d)) continue;
      cat.exercises.forEach(ex => {
        sched++;
        const key = `${cat.id}|${ex.name}|w${weekIdx}d${d}`;
        if (state.log[key]?.done) done++;
      });
    }
    const p = sched > 0 ? Math.round(done / sched * 100) : 0;
    const color = p >= 80 ? 'var(--green)' : p >= 50 ? 'var(--orange)' : 'var(--accent)';
    return `<div class="progress-container">
      <div class="progress-label"><span>${cat.name}</span><span>${done}/${sched} (${p}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${color}"></div></div>
    </div>`;
  }).join('');
  document.getElementById('dashboard-progress').innerHTML = progressHtml || '<p style="color:var(--text2)">Add exercises in the Categories tab to see progress here.</p>';
}

// ═══════════════════════════════════════════
// RENDER: MOTIVATION
// ═══════════════════════════════════════════
function renderMotivation() {
  renderQuote('motivation-quote-area');
  const grid = document.getElementById('video-grid');
  grid.innerHTML = state.videos.map((v, i) => `
    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/${v.id}" allowfullscreen loading="lazy"></iframe>
      <div class="video-info">
        <h4>${v.title}</h4>
        <p>${v.desc}</p>
        <button class="btn btn-danger btn-small" style="margin-top:6px" onclick="removeVideo(${i})">Remove</button>
      </div>
    </div>`).join('');
}

function removeVideo(idx) {
  state.videos.splice(idx, 1);
  saveState();
  renderMotivation();
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openAddCategoryModal() {
  document.getElementById('new-cat-name').value = '';
  document.getElementById('new-cat-freq-type').value = 'daily';
  document.getElementById('custom-freq-row').style.display = 'none';
  renderDayCheckboxes('day-checkboxes', []);
  document.getElementById('modal-add-category').classList.add('open');
}

document.getElementById('new-cat-freq-type').addEventListener('change', function() {
  document.getElementById('custom-freq-row').style.display = this.value === 'custom' ? 'block' : 'none';
});

document.getElementById('edit-cat-freq-type').addEventListener('change', function() {
  document.getElementById('edit-custom-freq-row').style.display = this.value === 'custom' ? 'block' : 'none';
});

function renderDayCheckboxes(containerId, selected) {
  document.getElementById(containerId).innerHTML = DAYS.map((d, i) => `
    <label style="display:flex;align-items:center;gap:4px;font-size:.82rem;cursor:pointer;">
      <input type="checkbox" value="${i}" ${selected.includes(i)?'checked':''} style="accent-color:var(--accent)"> ${d}
    </label>`).join('');
}

function getSelectedDays(containerId) {
  return [...document.querySelectorAll(`#${containerId} input:checked`)].map(cb => parseInt(cb.value));
}

function addCategory() {
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) return;
  const freqType = document.getElementById('new-cat-freq-type').value;
  const freqNum = freqType === 'daily' ? 7 : parseInt(document.getElementById('new-cat-freq-num').value);
  const days = freqType === 'daily' ? [0,1,2,3,4,5,6] : getSelectedDays('day-checkboxes');
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + Date.now();
  state.categories.push({ id, name, freqType, freqNum, days, exercises: [] });
  saveState();
  closeModal('modal-add-category');
  renderAll();
}

function openEditCategoryModal(catId) {
  const cat = state.categories.find(c => c.id === catId);
  document.getElementById('edit-cat-id').value = catId;
  document.getElementById('edit-cat-name').value = cat.name;
  document.getElementById('edit-cat-freq-type').value = cat.freqType;
  document.getElementById('edit-custom-freq-row').style.display = cat.freqType === 'custom' ? 'block' : 'none';
  document.getElementById('edit-cat-freq-num').value = cat.freqNum;
  renderDayCheckboxes('edit-day-checkboxes', cat.days);
  document.getElementById('modal-edit-category').classList.add('open');
}

function saveCategory() {
  const catId = document.getElementById('edit-cat-id').value;
  const cat = state.categories.find(c => c.id === catId);
  cat.name = document.getElementById('edit-cat-name').value.trim();
  cat.freqType = document.getElementById('edit-cat-freq-type').value;
  cat.freqNum = cat.freqType === 'daily' ? 7 : parseInt(document.getElementById('edit-cat-freq-num').value);
  cat.days = cat.freqType === 'daily' ? [0,1,2,3,4,5,6] : getSelectedDays('edit-day-checkboxes');
  saveState();
  closeModal('modal-edit-category');
  renderAll();
}

function deleteCategory() {
  const catId = document.getElementById('edit-cat-id').value;
  if (!confirm('Delete this category and all its exercises?')) return;
  state.categories = state.categories.filter(c => c.id !== catId);
  saveState();
  closeModal('modal-edit-category');
  renderAll();
}

function openAddVideoModal() {
  document.getElementById('new-video-url').value = '';
  document.getElementById('new-video-title').value = '';
  document.getElementById('new-video-desc').value = '';
  document.getElementById('modal-add-video').classList.add('open');
}

function addVideo() {
  const url = document.getElementById('new-video-url').value.trim();
  const title = document.getElementById('new-video-title').value.trim() || 'Untitled Video';
  const desc = document.getElementById('new-video-desc').value.trim();
  let id = url;
  const match = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  if (match) id = match[1];
  else if (url.length === 11) id = url;
  state.videos.push({ id, title, desc });
  saveState();
  closeModal('modal-add-video');
  renderMotivation();
}

// ═══════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'exercise-tracker-backup.json';
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.categories) {
          state = data;
          saveState();
          renderAll();
          alert('Data imported successfully!');
        }
      } catch(err) { alert('Invalid file format'); }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

function resetAllData() {
  if (!confirm('Reset ALL data? This cannot be undone.')) return;
  if (!confirm('Are you really sure?')) return;
  state = { categories: defaultCategories(), log: {}, videos: defaultVideos(), currentWeek: 0 };
  saveState();
  renderAll();
}

// ═══════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════
function renderAll() {
  renderDashboard();
  renderTracker();
  renderCategories();
  renderMotivation();
}

// Initial render
renderAll();
</script>
